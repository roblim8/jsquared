{% extends "jsquared_app/base.html" %}
{% block bottom_nav %}{% endblock %}
{% block content %}

<!-- Back -->
<div class="detail-topbar">
  <a href="{% url 'meat_category' meat.meat_id %}" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    Back
  </a>
</div>

<div class="page-header">
  <h1 class="page-title">Add Cooking Style</h1>
</div>

<form method="post" class="card card-body" style="margin-top: 1rem;" enctype="multipart/form-data"> 
  {% csrf_token %}

  <div class="mb-2">
    <label class="form-label">Name</label>
    <input class="form-control" name="style_name" required />
  </div>

  <div class="row">
    <div class="col-md-4 mb-2">
      <label class="form-label">Prices (₱)</label>
      <input class="form-control" name="cooking_charge" type="number" step="0.01" required />
    </div>
    <div class="col-md-4 mb-2">
      <label class="form-label">Weight Min (kg)</label>
      <input class="form-control" name="c_weight_min" type="number" step="0.01" />
    </div>
    <div class="col-md-4 mb-2">
      <label class="form-label">Weight Max (kg)</label>
      <input class="form-control" name="c_weight_max" type="number" step="0.01" />
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Description (Optional)</label>
    <input class="form-control" name="style_description"/>
  </div>

  <div class="mb-3">
    <label class="form-label">Icon (optional)</label>
    <label for="icon-upload" style="width: 100%; border: 2px dashed #ddd; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; display: block;">
        <div style="font-size: 24px; color: #bbb;">★</div>
        <div style="color: #888;">Upload your image here</div>
        <div style="color: #0d6efd; text-decoration: underline; font-size: 14px;">Browse</div>
    </label>
    <input type="file" name="icon" id="icon-upload" accept="image/*" style="display: none;">
  </div>

  <nav class="bottom-button">
    <button class="cr-full-modal-add-btn" id="variedModalAddBtn"  type="submit">Save</button>
  </nav>
</form>

{% endblock %}
