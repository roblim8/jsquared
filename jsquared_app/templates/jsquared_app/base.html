{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J Squared Palutuan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'jsquared_app/styles.css' %}">
</head>
<body>

  <main class="page-scrollable">
    {% if messages %}
      <div class="container mt-3">
        {% for message in messages %}
          <div class="alert-toast alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    
    {% block content %}{% endblock %}
  </main>

  {% block bottom_nav %}

  <!-- FAB -->
  <a href="{% url 'order_create' %}" class="fab">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
         stroke="var(--black)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 2h14v16
              c-0.8 0-1.2 0.8-2 0.8s-1.2-0.8-2-0.8
              s-1.2 0.8-2 0.8s-1.2-0.8-2-0.8
              s-1.2 0.8-2 0.8s-1.2-0.8-2-0.8V2z"/>
      <line x1="8" y1="6"  x2="14" y2="6"/>
      <line x1="8" y1="9"  x2="16" y2="9"/>
      <line x1="8" y1="12" x2="13" y2="12"/>
      <circle cx="17" cy="17" r="4" fill="var(--black)" stroke="none"/>
      <line x1="17" y1="14.5" x2="17" y2="19.5" stroke="var(--primary)" stroke-width="1.8"/>
      <line x1="14.5" y1="17" x2="19.5" y2="17" stroke="var(--primary)" stroke-width="1.8"/>
    </svg>
  </a>

  <nav class="bottom-nav">
    <div class="nav-tabs-custom">

      <!-- Prices -->
      <a href="{% url 'home' %}"
         class="nav-tab-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Prices</span>
      </a>

      <!-- Inquiries -->
      <a href="{% url 'inquiry_list' %}"
         class="nav-tab-item {% if request.resolver_match.url_name == 'inquiry_list' %}active{% endif %}">
        <div class="nav-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <path d="M9 8h4.5a2.5 2.5 0 010 5H9v-5z"/>
            <path d="M9 13h5"/>
            <line x1="9" y1="8" x2="9" y2="16"/>
            <line x1="7" y1="11" x2="11" y2="11"/>
          </svg>
          <span class="nav-notif"></span>
        </div>
        <span>Inquiries</span>
      </a>

      <!-- FAB text -->
      <div class="nav-tab-item">
        <span style="margin-top: 1.8rem;">Request</span>
      </div>

      <!-- Orders -->
      <a href="{% url 'order_list' %}"
         class="nav-tab-item {% if request.resolver_match.url_name == 'order_list' or request.resolver_match.url_name == 'order_history' %}active{% endif %}">
        <div class="nav-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17h18"/>
            <path d="M5 17A7 7 0 0119 17"/>
            <rect x="10" y="4" width="4" height="5" rx="1"/>
            <line x1="12" y1="9" x2="12" y2="10"/>
          </svg>
          <span class="nav-notif"></span>
        </div>
        <span>Orders</span>
      </a>

      <!-- Cooking Styles -->
      <a href="{% url 'cooking_styles_list' %}"
         class="nav-tab-item {% if request.resolver_match.url_name == 'cooking_styles_list' %}active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="13" r="6"/>
          <path d="M16 13h5"/>
          <path d="M19 10l2 3-2 3"/>
          <line x1="6" y1="6" x2="8" y2="8"/>
        </svg>
        <span>Cooking</span>
      </a>

    </div>
  </nav>
  {% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const AUTO_REFRESH_PAGES = ["home", "order_list", "order_history", "inquiry_list", "meat_price_list"];
const currentPage = "{% if request.resolver_match %}{{ request.resolver_match.url_name }}{% endif %}";
if (AUTO_REFRESH_PAGES.includes(currentPage)) {
  setTimeout(() => {
    if (!document.querySelector('input:focus, textarea:focus, select:focus')) {
      window.location.reload();
    }
  }, 8000);
}
</script></body>
</html>
