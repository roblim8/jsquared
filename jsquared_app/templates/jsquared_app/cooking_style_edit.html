{% extends "jsquared_app/base.html" %}
{% block bottom_nav %}{% endblock %}
{% block content %}

<!-- Back -->
<div class="detail-topbar">
  <a href="{% url 'meat_category' c.meat_item.meat_id %}" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    Back
  </a>
</div>

<div class="page-header">
  <h1 class="page-title">Edit Cooking Style</h1>
</div>

<form method="post" class="card card-body" style="margin-top: 1rem;" enctype="multipart/form-data">
  {% csrf_token %}

  <div class="mb-2">
    <label class="form-label">Name</label>
    <input class="form-control" name="style_name" value="{{ c.style_name }}" required />
  </div>

  <div class="row">
    <div class="col-md-4 mb-2">
      <label class="form-label">Prices (₱)</label>
      <input class="form-control" name="cooking_charge" type="number" step="0.01" value="{{ c.cooking_charge }}" required />
    </div>
    <div class="col-md-4 mb-2">
      <label class="form-label">Weight Min (kg)</label>
      <input class="form-control" name="c_weight_min" type="number" step="0.01" value="{{ c.c_weight_min }}" />
    </div>
    <div class="col-md-4 mb-2">
      <label class="form-label">Weight Max (kg)</label>
      <input class="form-control" name="c_weight_max" type="number" step="0.01" value="{{ c.c_weight_max }}" />
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <input class="form-control" name="style_description" value="{{ c.style_description }}" />
  </div>

  <div class="mb-3">
    <label class="form-label">Current Icon</label>
    {% if c.icon %}
      <div class="mb-2">
        <img src="{{ c.icon.url }}" style="width: 50px; border-radius: 5px;">
        <span class="text-muted small">Current image</span>
      </div>
    {% endif %}
    
    <label for="icon-upload" style="width: 100%; border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; display: block;">
      <div style="color: #888;">Click to replace image</div>
    </label>
    <input type="file" name="icon" id="icon-upload" accept="image/*" style="display: none;">
  </div>

  <nav class="bottom-button" style="display:flex;gap:12px;padding:12px 1.25rem 1.5rem;">
    <button class="edit-btn" type="submit">Update Style</button>
    <a class="od-btn-cancel" style="width:100%;" href="{% url 'cooking_style_delete' c.pk %}">Archive Style</a>
  </nav>
</form>

{% endblock %}
