{% extends "jsquared_app/base.html" %}{% block content %}<div class="container py-4"><h2>Edit Meat Item</h2><form method="post" class="card p-3">{% csrf_token %}<input class="form-control mb-2" name="meat_type" value="{{ m.meat_type }}" required><input class="form-control mb-2" type="number" step="0.01" name="current_price" value="{{ m.current_price }}" required><div class="row"><div class="col"><input class="form-control mb-2" type="number" step="0.01" name="weight_min" value="{{ m.weight_min }}"></div><div class="col"><input class="form-control mb-2" type="number" step="0.01" name="weight_max" value="{{ m.weight_max }}"></div></div><select class="form-select mb-3" name="item_status"><option value="Available" {% if m.item_status == 'Available' %}selected{% endif %}>Available</option><option value="Out of Stock" {% if m.item_status == 'Out of Stock' %}selected{% endif %}>Out of Stock</option><option value="Discontinued" {% if m.item_status == 'Discontinued' %}selected{% endif %}>Discontinued</option></select><button class="btn btn-primary">Save</button></form></div>{% endblock %}
