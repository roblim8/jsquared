{% extends "jsquared_app/base.html" %}
{% load static %}
{% block content %}

<h3>Manager Login</h3>

<form method="post" action="{% url 'manager_login' %}">
  {% csrf_token %}

    <!-- Username -->
    <div class="login-input-wrapper">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
      <input type="text" name="username" id="id_username" class="login-input" placeholder="Manager"autocomplete="username" required>
    </div>

    <!-- Password -->
    <div class="login-input-wrapper">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <input type="password" name="password" id="id_password"
             class="login-input" placeholder="••••••••••••"
             autocomplete="current-password" required>
      <button type="button" class="eye-btn" onclick="togglePassword()">
        <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    {% if error %}
    <div class="login-error-block">
        <div class="login-error-row">
        <span class="login-error-text">{{ error }}</span>
        </div>
    </div>
    {% endif %}
    <button type="submit" class="login-btn">Log in</button>
</form>

{% endblock %}
