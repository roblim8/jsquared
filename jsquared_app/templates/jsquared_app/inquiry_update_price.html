{% extends "jsquared_app/base.html" %}
{% block content %}
{% block bottom_nav %}{% endblock %}

<div class="detail-topbar">
  <a href="{% url 'inquiry_list' %}" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    Back
  </a>
</div>

<h1 class="page-title">Update Price</h1>

<div class="card p-3 mt-3">
  <!-- Item row -->
  <div class="inq-modal-item-row">
    <div class="inq-modal-item-info">
      <p class="inq-modal-item-name" id="pModalName">{{ req.meat.meat_type }}</p>
      <p class="inq-modal-item-price" id="pModalPrice">₱{{ req.meat.current_price }}</p>
    </div>
  </div>

  <form method="post" class="mt-3">
    {% csrf_token %}

    <!-- NEW PRICE -->
    <label class="form-label">New price</label>
    <input type="number" step="0.01" name="new_price" id="priceInput" class="form-control" required>

    <!-- STATUS -->
    <label class="form-label mt-3">Market Availability</label>
    <select name="item_status" id="statusSelect" class="form-select">
      <option value="Available" {% if req.meat.item_status == "Available" %}selected{% endif %}>
        Available
      </option>
      <option value="Out of Stock" {% if req.meat.item_status == "Out of Stock" %}selected{% endif %}>
        Out of Stock
      </option>
    </select>

    <!-- NOTES -->
    <label class="form-label mt-3">Notes (optional)</label>
    <textarea name="notes" class="form-control" rows="3"></textarea>

    <!-- ACTIONS -->
    <nav class="bottom-button">
      <button class="login-btn">Update</button>
    </nav>

  </form>
</div>

<!-- DYNAMIC SCRIPT -->
<script>
const statusSelect = document.getElementById("statusSelect");
const priceInput = document.getElementById("priceInput");

function updatePriceBehavior() {
    if (statusSelect.value === "Available") {
        priceInput.required = true;
        priceInput.disabled = false;
    } else {
        priceInput.required = false;
        priceInput.value = "";
        priceInput.disabled = true;
    }
}

statusSelect.addEventListener("change", updatePriceBehavior);
updatePriceBehavior();
</script>

{% endblock %}
