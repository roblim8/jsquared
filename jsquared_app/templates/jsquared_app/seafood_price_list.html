{% extends "jsquared_app/base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="m-0">Seafood Price List</h5>
  <a class="btn btn-success btn-sm" href="{% url 'seafood_price_create' %}">+ Add</a>
</div>

<div class="list-group">
  {% for s in seafood %}
    <div class="list-group-item">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-semibold">{{ s.seafood_type }}</div>
          <div class="text-muted small">
            Weight: {{ s.weight_range }} kg • ₱{{ s.seafood_unit_price|floatformat:2 }}
          </div>
        </div>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-primary btn-sm"
             href="{% url 'seafood_price_edit' s.seafood_id %}">
            Edit
          </a>
          <a class="btn btn-outline-danger btn-sm"
             href="{% url 'seafood_price_delete' s.seafood_id %}">
            Delete
          </a>
        </div>
      </div>
    </div>
  {% empty %}
    <div class="text-muted">No seafood items yet.</div>
  {% endfor %}
</div>

{% endblock %}
