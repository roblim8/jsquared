{% extends "jsquared_app/base.html" %}
{% block content %}

<h3>Accept Inquiry</h3>

<div class="card p-3">
  <p class="mb-1"><strong>Inquiry #{{ req.inquiry_id }}</strong></p>
  <p class="mb-1">Meat: <strong>{{ req.meat.meat_type }}</strong></p>
  <p class="mb-3 text-muted">Status: {{ req.status }}</p>

  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <a class="btn btn-secondary" href="{% url 'inquiry_list' %}">Cancel</a>
    <button class="btn btn-success">Accept</button>
  </form>
</div>

{% endblock %}
