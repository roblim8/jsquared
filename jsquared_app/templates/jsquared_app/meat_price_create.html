{% extends "jsquared_app/base.html" %}{% block content %}<div class="container py-4"><h2>Add Meat Item</h2><form method="post" class="card p-3">{% csrf_token %}<input class="form-control mb-2" name="meat_type" placeholder="Meat type" required><input class="form-control mb-2" type="number" step="0.01" name="current_price" placeholder="Current price" required><div class="row"><div class="col"><input class="form-control mb-2" type="number" step="0.01" name="weight_min" placeholder="Min weight"></div><div class="col"><input class="form-control mb-2" type="number" step="0.01" name="weight_max" placeholder="Max weight"></div></div><select class="form-select mb-3" name="item_status"><option>Available</option><option>Out of Stock</option><option>Discontinued</option></select><button class="btn btn-primary">Create</button></form></div>{% endblock %}
