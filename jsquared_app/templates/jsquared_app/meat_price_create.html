{% extends "jsquared_app/base.html" %}
{% block content %}
{% block bottom_nav %}{% endblock %}

<!-- Back nav -->
<div class="detail-topbar">
  <a href="{% url 'home' %}" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    Back
  </a>
</div>

<div class="container py-4"><h1 class="page-title">Add Meat Item</h1>
    <form method="post" class="card p-3 mt-3">
        {% csrf_token %}
        <input id="meatType" class="form-control mb-2" name="meat_type" placeholder="Meat type" required>
        <input id="price" class="form-control mb-2" type="number" step="0.01" name="current_price" placeholder="Current price" required>
        <div class="row">
            <div class="col">
                <input id="minWeight" class="form-control mb-2" type="number" step="0.01" name="weight_min" placeholder="Min weight">
            </div>
            <div class="col">
                <input id="maxWeight" class="form-control mb-2" type="number" step="0.01" name="weight_max" placeholder="Max weight">
            </div>
        </div>
        <select id="status" class="form-select mb-3" name="item_status">
                <option>Available</option>
                <option>Out of Stock</option>
                <option>Discontinued</option>
        </select>
        <div class="mb-3">
          <label class="form-label">Description (Optional)</label>
          <input class="form-control" name="style_description"/>
        </div>

        <div class="mb-3">
          <label class="form-label">Icon (optional)</label>
          <label for="icon-upload" style="width: 100%; border: 2px dashed #ddd; border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; display: block;">
              <div style="font-size: 24px; color: #bbb;">★</div>
              <div style="color: #888;">Upload your image here</div>
              <div style="color: #0d6efd; text-decoration: underline; font-size: 14px;">Browse</div>
          </label>
          <input type="file" name="icon" id="icon-upload" accept="image/*" style="display: none;">
        </div>
        <nav class="bottom-button">
            <button id="addMeatBtn" class="create-submit-btn" disabled>Add Meat</button>        
        </nav>
    </form>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const meatType = document.getElementById("meatType");
  const price = document.getElementById("price");
  const minWeight = document.getElementById("minWeight");
  const maxWeight = document.getElementById("maxWeight");
  const status = document.getElementById("status");
  const button = document.getElementById("addMeatBtn");

  function validateForm() {
    const isFilled =
      meatType.value.trim() !== "" &&
      price.value !== "" &&
      minWeight.value !== "" &&
      maxWeight.value !== "" &&
      status.value !== "";

    button.disabled = !isFilled;
    button.classList.toggle("create-submit-btn-active", isFilled);
  }

  [meatType, price, minWeight, maxWeight, status].forEach(el => {
    el.addEventListener("input", validateForm);
    el.addEventListener("change", validateForm);
  });

  validateForm(); 
});
</script>
{% endblock %}
