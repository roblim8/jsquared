{% extends "jsquared_app/base.html" %}
{% load static %}
{% block bottom_nav %}{% endblock %}
{% block content %}

<div class="detail-topbar">
  <a href="{% url 'discount_list' %}" class="back-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    Back
  </a>
</div>

<div class="page-header">
  <h1 class="page-title">{% if mode == 'create' %}Add Discount{% else %}Edit Discount{% endif %}</h1>
</div>

<form method="post" style="padding: 0 1.25rem;">
  {% csrf_token %}

  <div class="sup-form-card">

    <!-- Discount Type -->
    <label class="sup-form-label">
      Discount type <span class="sup-required">*</span>
    </label>
    <div class="login-input-wrapper" style="margin-bottom:16px;">
      <select name="discount_type" class="login-input" style="appearance:auto;cursor:pointer;">
        <option value="PWD"
          {% if discount.discount_type == 'PWD' %}selected{% endif %}>
          PWD
        </option>
        <option value="Senior Citizen"
          {% if discount.discount_type == 'Senior Citizen' %}selected{% endif %}>
          Senior Citizen
        </option>
        <option value="Suki"
          {% if discount.discount_type == 'Suki' %}selected{% endif %}>
          Suki
        </option>
      </select>
    </div>

    <!-- Discount Value -->
    <label class="sup-form-label">
      Discount value (%) <span class="sup-required">*</span>
    </label>
    <div class="login-input-wrapper">
      <input type="number" name="discount_value" class="login-input"
             step="0.01" min="0" max="100"
             placeholder="e.g. 20"
             value="{{ discount.discount_value|default:'' }}" required>
      <span style="font-size:14px;font-weight:600;color:var(--muted);flex-shrink:0;">%</span>
    </div>

  </div>

  <nav class="bottom-button">
    <button type="submit" class="create-submit-btn create-submit-btn-active" style="width:100%;">
      {% if mode == 'create' %}Add Discount{% else %}Save Changes{% endif %}
    </button>
  </nav>
</form>

{% endblock %}
